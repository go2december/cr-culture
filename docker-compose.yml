services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: crculture_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: crculture
    volumes:
      - mongodb_data:/data/db
    networks:
      - crculture_network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok ? quit(0) : quit(1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Next.js + Payload CMS Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: crculture_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URI=mongodb://admin:password123@mongodb:27017/crculture?authSource=admin
      - PAYLOAD_SECRET=cr-culture-super-secret-key-2026
      - NEXT_PUBLIC_SERVER_URL=http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - crculture_network
    command: sh -c "if [ ! -x node_modules/.bin/next ]; then npm install --legacy-peer-deps; fi; npm run dev"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Production runtime parity service
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: crculture_app_prod
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URI=mongodb://admin:password123@mongodb:27017/crculture?authSource=admin
      - PAYLOAD_SECRET=cr-culture-super-secret-key-2026
      - NEXT_PUBLIC_SERVER_URL=http://localhost:3001
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - crculture_network
    profiles:
      - prod
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  mongodb_data:


networks:
  crculture_network:
    driver: bridge
